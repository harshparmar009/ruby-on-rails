apiVersion: apps/v1
kind: Deployment
metadata:
  name: rails-backend
  namespace: rails-task

spec:
  replicas: 1

  selector:
    matchLabels:
      app: rails-backend

  template:
    metadata:
      labels:
        app: rails-backend

    spec:
      imagePullSecrets:
        - name: gitlab-registry-auth

      initContainers:
        - name: database-prepare
          image: registry.gitlab.com/harshparmar009/ruby-on-rails/backend:latest
          imagePullPolicy: Always

          command:
            - sh
            - -c
            - bin/rails db:prepare

          env:
            - name: RAILS_ENV
              value: production

            - name: DATABASE_HOST
              value: postgres

            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: SECRET_KEY_BASE

      containers:
        - name: rails-backend
          image: registry.gitlab.com/harshparmar009/ruby-on-rails/backend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          env:
            - name: RAILS_ENV
              value: production

            - name: RAILS_LOG_TO_STDOUT
              value: "true"

            - name: DATABASE_HOST
              value: postgres

            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: SECRET_KEY_BASE

          readinessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /up
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: rails-backend
  namespace: rails-task

spec:
  selector:
    app: rails-backend

  ports:
    - name: http
      port: 80
      targetPort: 80
