apiVersion: apps/v1
kind: Deployment
metadata:
  name: rails-frontend
  namespace: rails-task

spec:
  replicas: 1

  selector:
    matchLabels:
      app: rails-frontend

  template:
    metadata:
      labels:
        app: rails-frontend

    spec:
      imagePullSecrets:
        - name: gitlab-registry-auth

      containers:
        - name: rails-frontend
          image: registry.gitlab.com/harshparmar009/ruby-on-rails/frontend:e4190c56
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: rails-frontend
  namespace: rails-task

spec:
  type: NodePort

  selector:
    app: rails-frontend

  ports:
    - name: http
      port: 80
      targetPort: 80
