apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: rails-task
type: Opaque
stringData:
  POSTGRES_DB: rails_api_template_production
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres123
  SECRET_KEY_BASE: 6575cf6f8fc1c0036f27e841a90c3207f98043bafb4d963e471908ea12d6726798d24b6b0516fb93c14ed669784dcc78c29dd3cdf30221d2fe5e0f7d5bb95f71
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: rails-task
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: rails-task
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: rails-task
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
